<!DOCTYPE html>
<html>
<head>
  <title>Memento</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 40px;
      background: #fdf6ee;
      color: #333;
    }

    .header {
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 36px;
      margin: 0;
      background: linear-gradient(45deg, #c97b63, #a85d4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    .tagline {
      margin-top: 6px;
      color: #8a6f66;
      font-size: 14px;
      font-style: italic;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #c97b63;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #a85d4a;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    #form {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .note {
      display: flex;
      justify-content: space-between;
      background: white;
      padding: 18px;
      margin-bottom: 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .tag {
      background: #f3d6c6;
      padding: 4px 8px;
      border-radius: 6px;
      margin-right: 6px;
      font-size: 12px;
    }

    small {
      color: #888;
      font-size: 11px;
    }

    pre {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Memento</h1>
    <p class="tagline">let your memories last forever</p>
  </div>

  <div class="top-bar">
    <input id="searchInput" placeholder="Search memories...">
    <button onclick="searchNotes()">Search</button>
    <button onclick="toggleForm()">+ Memory</button>
    <button id="toggleBtn" onclick="loadNotes()">Show</button>
    <button onclick="randomMemory()">Don't you remember?</button>
  </div>

  <div id="form">
    <h3>New Memory</h3>
    <input id="title" placeholder="Title">
    <textarea id="content" placeholder="Write your memory..."></textarea>
    <input id="tags" placeholder="tags">
    <input id="image" placeholder="Image URL">
    <button onclick="createNote()">Save</button>
  </div>

  <div id="notes"></div>

  <script>

    let notesVisible = false;

    function toggleForm() {
      const f = document.getElementById("form");
      f.style.display = f.style.display === "block" ? "none" : "block";
    }

    function renderNotes() {
      fetch('/api/notes')
        .then(res => res.text())
        .then(data => {

          const container = document.getElementById('notes');
          container.innerHTML = "";

          data.split("\n").forEach(line => {
            if (!line.trim()) return;

            const fileName = line.split(" - ")[0];

            fetch(`/api/note?file=${fileName}`)
              .then(r => r.text())
              .then(content => {

                let title="", tags="", created="", updated="";
                let inYaml=false;

                content.split("\n").forEach(l => {
                  if (l.trim()==="---") inYaml=!inYaml;
                  else if (inYaml) {
                    if (l.startsWith("title:")) title=l.replace("title:","").trim();
                    if (l.startsWith("tags:")) tags=l.replace("tags:","").replace(/[\[\]]/g,"").trim();
                    if (l.startsWith("created:")) created=l.replace("created:","").trim();
                    if (l.startsWith("last_updated:")) updated=l.replace("last_updated:","").trim();
                  }
                });

                const div=document.createElement("div");
                div.className="note";

                div.innerHTML=`
                  <div>
                    <strong>${title}</strong>
                    <div>
                      ${tags.split(',').map(t=>`<span class="tag">${t.trim()}</span>`).join('')}
                    </div>
                  </div>

                  <div style="text-align:right;">
                    <small>Created at: ${created}</small><br>
                    <small>Last updated at: ${updated}</small><br>
                    <button onclick="event.stopPropagation(); deleteNote('${fileName}')">Delete</button>
                  </div>
                `;

                div.onclick=()=>loadNote(fileName);

                container.appendChild(div);
              });
          });

          notesVisible=true;
          document.getElementById("toggleBtn").innerText="Hide";
        });
    }

    function loadNotes() {
      if (notesVisible) {
        document.getElementById('notes').innerHTML="";
        notesVisible=false;
        toggleBtn.innerText="Show";
      } else renderNotes();
    }

    function createNote() {
      const title=titleEl.value;
      const content=contentEl.value;
      const tags=tagsEl.value;
      const image=document.getElementById("image").value;

      fetch('/api/create',{
        method:'POST',
        body:`${title}|${content}|${tags}|${image}`
      }).then(()=>renderNotes());
    }

    function loadNote(fileName) {
      fetch(`/api/note?file=${fileName}`)
        .then(res=>res.text())
        .then(data=>{

          let title="",tags="",created="",updated="",image="",body="";
          let inYaml=false,done=false;

          data.split("\n").forEach(line=>{
            if (line.trim()==="---") {
              if (!inYaml) inYaml=true;
              else {inYaml=false;done=true;}
              return;
            }

            if (inYaml) {
              if (line.startsWith("title:")) title=line.replace("title:","").trim();
              if (line.startsWith("tags:")) tags=line.replace("tags:","").replace(/[\[\]]/g,"").trim();
              if (line.startsWith("created:")) created=line.replace("created:","").trim();
              if (line.startsWith("last_updated:")) updated=line.replace("last_updated:","").trim();
              if (line.startsWith("image:")) image=line.replace("image:","").trim();
            } else if (done) {
              body+=line+"\n";
            }
          });

          document.getElementById('notes').innerHTML=`
            <button onclick="renderNotes()">Back</button>

            <div style="display:flex; gap:20px; margin-top:20px;">
              <div style="flex:1;">
                <h2>${title}</h2>
                <p>${tags}</p>
                <p>Created: ${created}</p>
                <p>Updated: ${updated}</p>
                <pre>${body}</pre>
              </div>

              <div style="flex:1;">
                ${image ? `<img src="${image}" style="max-width:100%; border-radius:10px;">` : ""}
              </div>
            </div>

            <button onclick="editNote('${fileName}')">Edit</button>
          `;
        });
    }

    function editNote(fileName) {
      fetch(`/api/note?file=${fileName}`)
        .then(r=>r.text())
        .then(data=>{

          let title="",tags="",image="",body="";
          let inYaml=false,done=false;

          data.split("\n").forEach(line=>{
            if (line.trim()==="---") {
              if (!inYaml) inYaml=true;
              else {inYaml=false;done=true;}
              return;
            }

            if (inYaml) {
              if (line.startsWith("title:")) title=line.replace("title:","").trim();
              if (line.startsWith("tags:")) tags=line.replace("tags:","").replace(/[\[\]]/g,"").trim();
              if (line.startsWith("image:")) image=line.replace("image:","").trim();
            } else if (done) {
              body+=line+"\n";
            }
          });

          document.getElementById('notes').innerHTML=`
            <input id="editTitle" value="${title}">
            <input id="editTags" value="${tags}">
            <input id="editImage" value="${image}">
            <textarea id="editContent">${body}</textarea>

            <button onclick="updateNote('${fileName}')">Save</button>
          `;
        });
    }

    function updateNote(fileName) {
      const title=document.getElementById("editTitle").value;
      const tags=document.getElementById("editTags").value;
      const image=document.getElementById("editImage").value;
      const content=document.getElementById("editContent").value;

      fetch('/api/update',{
        method:'POST',
        body:`${fileName}|${title}|${tags}|${image}|${content}`
      }).then(()=>renderNotes());
    }

    function deleteNote(fileName) {
      fetch('/api/delete',{
        method:'POST',
        body:fileName
      }).then(()=>renderNotes());
    }

    function searchNotes() {
      const q=document.getElementById("searchInput").value;

      fetch(`/api/search?q=${q}`)
        .then(r=>r.text())
        .then(data=>{
          const container=document.getElementById("notes");
          container.innerHTML="";
          data.split("\n").forEach(line=>{
            if (!line.trim()) return;
            const file=line.split(" - ")[0];
            const div=document.createElement("div");
            div.innerText=line;
            div.onclick=()=>loadNote(file);
            container.appendChild(div);
          });
        });
    }

    function randomMemory() {
      fetch('/api/random')
        .then(r=>r.text())
        .then(data=>{
          document.getElementById('notes').innerHTML=`<pre>${data}</pre>`;
        });
    }

  </script>

</body>
</html>
